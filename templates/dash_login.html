<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — Daksham Capital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body style="align-items:center;justify-content:center;background:#f5f7fa">
<div style="width:380px;max-width:90vw">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-family:'DM Serif Display',serif;font-size:24px;color:#0f172a">Daksham <span style="color:#2563eb">Capital</span></div>
    <div style="font-size:11px;color:#94a3b8;margin-top:4px;letter-spacing:1px;text-transform:uppercase">Fund Research Portal</div>
  </div>
  <div class="card">
    <div class="card-b">
      {% for msg in get_flashed_messages() %}
      <div class="upload-status err" style="display:block;margin-bottom:12px">{{ msg }}</div>
      {% endfor %}
      <form method="POST">
        <div class="upload-field">
          <label class="upload-label">Username</label>
          <input type="text" name="username" class="upload-input" placeholder="Enter username" autofocus required>
        </div>
        <div class="upload-field">
          <label class="upload-label">Password</label>
          <input type="password" name="password" class="upload-input" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn primary" style="width:100%;margin-top:10px">Login</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
