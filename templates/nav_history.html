<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NAV History — Daksham Capital Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/dashboard.css">
<style>
.admin-wrap{max-width:100%;margin:0;padding:0}
.admin-nav{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap}
.admin-nav a{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:500;text-decoration:none;border:1px solid #e2e8f0;color:#64748b;transition:all .15s;font-family:'Outfit',sans-serif}
.admin-nav a:hover{background:#f1f5f9;color:#374151}
.admin-nav a.active{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;font-weight:600}
.history-wrap{display:flex;flex-direction:column;height:calc(100vh - 130px);overflow:hidden}
.history-controls{padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-label{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px}
.ctrl-input{padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;font-family:'Outfit',sans-serif;outline:none;background:#fff}
.ctrl-input:focus{border-color:#3b82f6}
.ctrl-select{padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;font-family:'Outfit',sans-serif;background:#fff;outline:none}
.history-tbl-wrap{flex:1;overflow:auto}
.history-tbl-wrap::-webkit-scrollbar{width:4px;height:4px}
.history-tbl-wrap::-webkit-scrollbar-thumb{background:#d1d5db}
.htbl{border-collapse:collapse;font-size:11px;white-space:nowrap}
.htbl th{padding:6px 10px;background:#1e3a5f;color:#fff;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:10;text-align:right;border-right:1px solid #2d5f8a}
.htbl th:first-child{text-align:left;min-width:110px;position:sticky;left:0;z-index:20;background:#1e3a5f}
.htbl th.bm-th{background:#92400e}
.htbl th.strat-th{background:#5b21b6}
.htbl td{padding:5px 10px;border-bottom:1px solid #f1f5f9;border-right:1px solid #f5f5f5;text-align:right;font-family:'DM Mono',monospace}
.htbl td:first-child{text-align:left;font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;color:#374151;position:sticky;left:0;background:#fff;z-index:5;border-right:1px solid #e2e8f0}
.htbl tr:hover td{background:#f8fafc}
.htbl tr:hover td:first-child{background:#f0f4ff}
.nav-val{color:#1e293b}
.nav-missing{color:#dc2626;font-style:italic;font-size:10px}
.pagination{display:flex;align-items:center;gap:8px;padding:8px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0;font-size:11px}
.pg-btn{padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:11px;font-family:'Outfit',sans-serif}
.pg-btn:hover{background:#f1f5f9}
.pg-btn:disabled{opacity:.4;cursor:default}
.pg-info{color:#64748b}
.legend-note{font-size:10px;color:#94a3b8;padding:4px 20px;background:#fff}
</style>
</head>
<body style="overflow:hidden">
<header class="header">
  <div class="logo-wrap">
    <div class="logo">Daksham <span>Capital</span></div>
    <div class="logo-sub">NAV History</div>
  </div>
  <div class="header-right">
    <a href="/" class="admin-link">← Dashboard</a>
    <a href="/admin/logout" class="admin-link">Logout</a>
  </div>
</header>

<div class="admin-nav">
  <a href="/admin/funds">Fund Management</a>
  <a href="/admin/nav_history" class="active">NAV History</a>
  <a href="/admin/fund_details">Fund Details - Equity</a>
  <a href="/admin/fund_details_hybrid">Fund Details - Hybrid</a>
</div>

<div class="history-wrap">
  <div class="history-controls">
    <div class="ctrl-group">
      <label class="ctrl-label">Category</label>
      <select class="ctrl-select" id="catSel" onchange="loadHistory(1)">
        {% for cat in categories %}
        <option value="{{ cat.code }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">From</label>
      <input type="date" class="ctrl-input" id="fromDate" onchange="loadHistory(1)">
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">To</label>
      <input type="date" class="ctrl-input" id="toDate" onchange="loadHistory(1)">
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label">Filter Items</label>
      <select class="ctrl-select" id="fundFilter" multiple size="3" style="width:200px"
              onchange="applyFundFilter()">
      </select>
    </div>
    <button class="btn-sm" onclick="clearFilter()">Show All</button>
    <button class="btn primary" onclick="loadHistory(1)" style="padding:5px 14px;font-size:11px">Apply</button>
    <button class="btn" onclick="downloadNavHistory()" style="padding:5px 14px;font-size:11px">⬇ Download</button>
    <div style="font-size:10px;color:#64748b;align-self:center" id="statusMsg"></div>
  </div>
  <div class="legend-note">
    <span style="color:#dc2626;font-style:italic">N/A</span> = NAV not uploaded for that date · Dates in descending order · Default: last 30 days
  </div>
  <div class="history-tbl-wrap" id="tblWrap">
    <div style="padding:30px;color:#94a3b8;text-align:center">Loading NAV history…</div>
  </div>
  <div class="pagination" id="pagination" style="display:none">
    <button class="pg-btn" id="prevBtn" onclick="loadHistory(currentPage-1)">← Prev</button>
    <span class="pg-info" id="pgInfo"></span>
    <button class="pg-btn" id="nextBtn" onclick="loadHistory(currentPage+1)">Next →</button>
    <span class="pg-info" id="totalInfo"></span>
  </div>
</div>

<script>
let currentPage = 1;
let allFunds = [];
let selFundIds = [];

const today = new Date();
const toD = new Date(today); toD.setDate(toD.getDate()-1);
const fromD = new Date(toD); fromD.setDate(fromD.getDate()-30);
document.getElementById('toDate').value = toD.toISOString().slice(0,10);
document.getElementById('fromDate').value = fromD.toISOString().slice(0,10);

function applyFundFilter() {
  const sel = document.getElementById('fundFilter');
  selFundIds = Array.from(sel.selectedOptions).map(o=>o.value);
  loadHistory(1);
}
function clearFilter() {
  selFundIds = [];
  Array.from(document.getElementById('fundFilter').options).forEach(o=>o.selected=false);
  loadHistory(1);
}

function downloadNavHistory() {
  const cat = document.getElementById('catSel').value;
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  window.location.href = `/api/nav_history_download?category=${cat}&from_date=${from}&to_date=${to}`;
}

function loadHistory(page) {
  currentPage = page;
  const cat = document.getElementById('catSel').value;
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  document.getElementById('tblWrap').innerHTML =
    '<div style="padding:30px;color:#94a3b8;text-align:center">Loading…</div>';

  let url = `/api/nav_history?category=${cat}&page=${page}`;
  if (from) url += `&from_date=${from}`;
  if (to) url += `&to_date=${to}`;
  if (selFundIds.length) url += selFundIds.map(id=>`&fund_ids=${id}`).join('');

  fetch(url).then(r=>r.json()).then(data=>{
    if (data.error) {
      document.getElementById('tblWrap').innerHTML =
        `<div style="padding:20px;color:#dc2626">${data.error}</div>`;
      return;
    }
    if (data.all_funds && data.all_funds.length && !allFunds.length) {
      allFunds = data.all_funds;
      const sel = document.getElementById('fundFilter');
      sel.innerHTML = allFunds.map(f=>
        `<option value="${f.id}">${(f.short_name||f.name).substring(0,25)}</option>`
      ).join('');
    }

    const funds = data.funds;
    if (!funds.length) {
      document.getElementById('tblWrap').innerHTML =
        '<div style="padding:20px;color:#94a3b8;text-align:center">No data found.</div>';
      return;
    }

    let th = '<tr><th>Date</th>';
    funds.forEach(f=>{
      const cls = f.type==='benchmark'?'bm-th':f.type==='strategy'?'strat-th':'';
      const badge = f.type==='benchmark'?' [BM]':f.type==='strategy'?' [PRI]':'';
      th += `<th class="${cls}">${(f.short_name||f.name).replace(/ Fund-Reg\(G\)/g,'').replace(/ Fund\(G\)/g,'').substring(0,20)}${badge}</th>`;
    });
    th += '</tr>';

    let tb = '';
    data.rows.forEach(row=>{
      tb += `<tr><td>${row.date}</td>`;
      funds.forEach(f=>{
        const v = row.navs[f.id];
        if (v===null||v===undefined) {
          tb += '<td><span class="nav-missing">N/A</span></td>';
        } else {
          tb += `<td class="nav-val">${parseFloat(v).toFixed(4)}</td>`;
        }
      });
      tb += '</tr>';
    });

    document.getElementById('tblWrap').innerHTML =
      `<table class="htbl"><thead>${th}</thead><tbody>${tb}</tbody></table>`;

    const pg = document.getElementById('pagination');
    pg.style.display = 'flex';
    document.getElementById('pgInfo').textContent = `Page ${data.page} of ${data.total_pages}`;
    document.getElementById('totalInfo').textContent = `${data.total_dates} dates · ${data.from_date} to ${data.to_date}`;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= data.total_pages;
    document.getElementById('statusMsg').textContent = `${funds.length} items shown`;
  }).catch(e=>{
    document.getElementById('tblWrap').innerHTML =
      `<div style="padding:20px;color:#dc2626">Error: ${e.message}</div>`;
  });
}

loadHistory(1);
</script>
</body>
</html>
