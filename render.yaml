services:
  - type: web
    name: daksham-research
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: Admin@123
    disk:
      name: daksham-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
